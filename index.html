<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разбор Сна</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #e0d9f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { text-align: center; padding: 40px 20px 20px; }

  .input-section label { display: block; color: #9988cc; font-size: 0.85rem; margin-bottom: 8px; }
  textarea { width: 100%; background: #0d0d1a; border: 1px solid #3d3d60; color: #e0d9f0; padding: 12px; border-radius: 8px; font-size: 0.95rem; min-height: 120px; resize: vertical; outline: none; font-family: inherit; }
  textarea:focus { border-color: #7c6fcd; }

  .audio-zone:hover { border-color: #7c6fcd; background: #1d1d35; }
  .audio-zone.dragover { border-color: #c9b8ff; background: #1d1d35; }
  .audio-zone p { color: #6655aa; font-size: 0.9rem; }
  .audio-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  #audioInput { display: none; }
  .audio-preview { margin-top: 12px; color: #9988cc; font-size: 0.85rem; }
  audio { margin-top: 8px; width: 100%; }

  .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #5c4faa, #7c6fcd); color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s; margin-bottom: 20px; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ai { background: linear-gradient(135deg, #1a3a5c, #2a5a8c); border: 1px solid #3a7abf; margin-top: 0; }
  .btn-ai:hover { opacity: 0.9; }

  .status { text-align: center; color: #9988cc; font-size: 0.9rem; min-height: 20px; margin-bottom: 16px; }

  .results { display: none; }
  .results h2 { color: #c9b8ff; margin-bottom: 16px; font-size: 1.1rem; }

  .dream-card { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
  .dream-obraz { font-size: 1rem; font-weight: 600; color: #e0d9f0; margin-bottom: 6px; }
  .dream-match { font-size: 0.8rem; color: #7c6fcd; margin-bottom: 8px; }
  .dream-trakt { color: #b0a0d0; font-size: 0.9rem; line-height: 1.5; }

  .ai-analysis { background: #0f1726; border: 1px solid #2d3a55; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .ai-analysis h2 { color: #88aaff; margin-bottom: 12px; font-size: 1.1rem; }
  .ai-analysis p { color: #b0c0e0; line-height: 1.6; font-size: 0.95rem; }

  .no-match { color: #665577; font-size: 0.85rem; font-style: italic; }

  .divider { border: none; border-top: 1px solid #2d2d50; margin: 20px 0; }
  .dream-display { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .dream-display h2 { color: #c9b8ff; margin-bottom: 12px; font-size: 1.1rem; }
  .dream-display p { color: #d0c8e8; line-height: 1.7; font-size: 0.95rem; white-space: pre-wrap; }

  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; background: #12122a; border: 1px solid #2d2d50; border-radius: 8px; text-align: center; cursor: pointer; color: #6655aa; font-size: 0.85rem; transition: all 0.2s; }
  .tab.active { background: #1d1d40; border-color: #7c6fcd; color: #c9b8ff; }
</style>
</head>
<body>

<div class="header">
  <h1>🌙 Разбор Сна</h1>
  <p>Вставьте текст сна или загрузите аудио — получите трактовку образов</p>
</div>

<div class="container">

  <div class="api-section">
    <label>🔑 Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <div class="api-section">
    <label>🔑 OpenAI API Key <span style="color:#665577;font-size:0.8rem">(для расшифровки аудио)</span></label>
    <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off">
  </div>

  <div class="input-section">
    <div class="tab-row">
      <div class="tab active" onclick="switchTab('text')">✍️ Текст сна</div>
      <div class="tab" onclick="switchTab('audio')">🎙️ Аудио</div>
    </div>

    <div id="textTab">
      <label>Опишите ваш сон</label>
      <textarea id="dreamText" placeholder="Сегодня мне приснилось..."></textarea>
    </div>

    <div id="audioTab" style="display:none">
      <label>Загрузите голосовое сообщение (.ogg, .opus, .mp3, .m4a, .wav)</label>
      <div class="audio-zone" id="audioZone" onclick="document.getElementById('audioInput').click()">
        <div class="icon">🎤</div>
        <p>Нажмите или перетащите файл сюда</p>
      </div>
      <input type="file" id="audioInput" accept=".ogg,.opus,.mp3,.m4a,.wav,.webm">
      <div class="audio-preview" id="audioPreview"></div>
    </div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyze()">🔮 Разобрать сон</button>
  <div class="status" id="status"></div>

  <div class="results" id="results">
    <div class="dream-display" id="dreamDisplay" style="display:none">
      <h2>🌙 Текст сна</h2>
      <p id="dreamDisplayText"></p>
    </div>
    <hr class="divider">
    <h2>📖 Образы из сонника</h2>
    <div id="cardsContainer"></div>
    <div id="aiBtn" style="display:none; margin-top:20px;">
      <button class="btn btn-ai" onclick="openAiAnalysis()">🤖 ИИ Анализ — углублённый разбор</button>
    </div>
  </div>

</div>

<script>
let sonnikData = null;
let audioFile = null;
let activeTab = 'text';

// Load sonnik.json dynamically
async function loadSonnik() {
  if (sonnikData) return sonnikData;
  try {
    const r = await fetch('./sonnik.json');
    sonnikData = await r.json();
    // Flatten to array for easy search
    sonnikData._flat = [];
    for (const letter in sonnikData) {
      if (letter === '_flat') continue;
      for (const entry of sonnikData[letter]) {
        sonnikData._flat.push(entry);
      }
    }
    return sonnikData;
  } catch(e) {
    throw new Error('Не удалось загрузить базу сонника (sonnik.json должен быть рядом с index.html)');
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='text')||(i===1&&tab==='audio')));
  document.getElementById('textTab').style.display = tab === 'text' ? 'block' : 'none';
  document.getElementById('audioTab').style.display = tab === 'audio' ? 'block' : 'none';
}

// Audio drag & drop
const audioZone = document.getElementById('audioZone');
audioZone.addEventListener('dragover', e => { e.preventDefault(); audioZone.classList.add('dragover'); });
audioZone.addEventListener('dragleave', () => audioZone.classList.remove('dragover'));
audioZone.addEventListener('drop', e => {
  e.preventDefault();
  audioZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) setAudioFile(e.dataTransfer.files[0]);
});
document.getElementById('audioInput').addEventListener('change', e => {
  if (e.target.files[0]) setAudioFile(e.target.files[0]);
});

function setAudioFile(file) {
  audioFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('audioPreview').innerHTML = `<span>📎 ${file.name}</span><br><audio controls src="${url}"></audio>`;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function tokenize(str) {
  // Split into meaningful words, min 3 chars
  return str.toLowerCase().replace(/[^а-яёa-z0-9 ]/gi, ' ').split(/\s+/).filter(w => w.length >= 3);
}

function searchSonnik(images, data) {
  const flat = data._flat;
  const results = [];

  for (const img of images) {
    const imgLow = img.toLowerCase().trim();
    const imgTokens = tokenize(imgLow);
    let best = null;
    let bestScore = 0;

    for (const entry of flat) {
      const obraz = entry.obraz.toLowerCase().trim();
      const obrazTokens = tokenize(obraz);
      let score = 0;

      // Exact match
      if (obraz === imgLow) {
        score = 100;
      }
      // Full phrase contained (whole phrase, not substring of word)
      else if (imgLow.length >= 4 && obraz === imgLow) {
        score = 90;
      }
      // Phrase-level: image phrase is fully inside obraz or vice versa
      // Only if the match is at word boundary
      else {
        const imgRe = new RegExp('(^|\\s)' + imgLow.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(\\s|$)');
        const obrazRe = new RegExp('(^|\\s)' + obraz.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(\\s|$)');
        if (imgRe.test(obraz)) score = 80;
        else if (obrazRe.test(imgLow)) score = 75;
        else {
          // Word overlap: count matching whole words
          let matches = 0;
          for (const w of imgTokens) {
            if (obrazTokens.includes(w)) matches++;
          }
          if (matches > 0) {
            // Score based on what fraction of words matched
            score = Math.round(60 * matches / Math.max(imgTokens.length, obrazTokens.length));
          }
        }
      }

      if (score > bestScore) { bestScore = score; best = entry; }
    }

    // Only show if score is meaningful (at least one real word match)
    results.push({ image: img, match: best, score: bestScore });
  }
  return results;
}

// Transcribe audio using OpenAI Whisper API
async function transcribeAudio(file) {
  const openaiKey = document.getElementById('openaiKey').value.trim();
  if (!openaiKey) throw new Error('Введите OpenAI API Key для расшифровки аудио');

  // Whisper принимает файл напрямую через FormData
  const formData = new FormData();
  // .opus файлы переименовываем в .ogg — Whisper их принимает
  const filename = file.name.endsWith('.opus') ? file.name.replace('.opus', '.ogg') : file.name;
  formData.append('file', file, filename);
  formData.append('model', 'whisper-1');
  formData.append('language', 'ru');

  const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + openaiKey },
    body: formData
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('Whisper: ' + (err.error?.message || resp.statusText));
  }

  const data = await resp.json();
  return data.text || '';
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('⚠️ Введите API ключ'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').style.display = 'none';

  try {
    // Step 1: Load sonnik
    setStatus('📚 Загружаю базу сонника...');
    const data = await loadSonnik();

    // Step 2: Get dream text
    let dreamText = '';
    if (activeTab === 'audio') {
      if (!audioFile) { setStatus('⚠️ Загрузите аудио файл'); btn.disabled = false; return; }
      setStatus('🎙️ Распознаю речь...');
      dreamText = await transcribeAudio(audioFile);
      if (!dreamText) throw new Error('Не удалось распознать речь. Попробуйте текстовый режим.');
      // Show transcribed text to user
      document.getElementById('dreamText').value = dreamText;
      setStatus('✅ Речь распознана. Анализирую...');
    } else {
      dreamText = document.getElementById('dreamText').value.trim();
      if (!dreamText) { setStatus('⚠️ Введите текст сна'); btn.disabled = false; return; }
    }

    // Step 3: Extract images via Claude
    setStatus('🔍 Извлекаю образы из сна...');
    const extractResp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Из текста сна выдели все ключевые образы (предметы, существа, места, явления, действия). 
Верни ТОЛЬКО список образов через запятую, без пояснений, без нумерации. 
Образы на русском языке, в именительном падеже, 1-4 слова каждый.

Текст сна: "${dreamText}"`
        }]
      })
    });
    const ed = await extractResp.json();
    if (ed.error) throw new Error(ed.error.message);
    const imagesRaw = ed.content.map(c => c.text || '').join('');
    const images = imagesRaw.split(',').map(s => s.trim()).filter(Boolean);

    // Step 4: Match with sonnik
    setStatus('📖 Сопоставляю с сонником...');
    const matches = searchSonnik(images, data);

    // Render results
    setStatus('');

    // Show dream text
    // Store globally for AI analysis page
    window._dreamData = { dreamText, matches, apiKey };
    const dreamDisplayEl = document.getElementById('dreamDisplay');
    document.getElementById('dreamDisplayText').textContent = dreamText;
    dreamDisplayEl.style.display = 'block';

    const cards = document.getElementById('cardsContainer');
    cards.innerHTML = '';
    for (const m of matches) {
      const card = document.createElement('div');
      card.className = 'dream-card';
      if (m.score >= 30 && m.match) {
        card.innerHTML = `
          <div class="dream-obraz">🌀 ${m.image}</div>
          <div class="dream-match">→ совпадение: «${m.match.obraz}»</div>
          <div class="dream-trakt">${m.match.trakt}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="dream-obraz">🌀 ${m.image}</div>
          <div class="no-match">Образ не найден в базе сонника</div>
        `;
      }
      cards.appendChild(card);
    }

    document.getElementById('results').style.display = 'block';
    document.getElementById('aiBtn').style.display = 'block';

  } catch(e) {
    setStatus('❌ Ошибка: ' + e.message);
  }

  btn.disabled = false;
}

function openAiAnalysis() {
  const d = window._dreamData;
  if (!d) return;

  const matchedCards = d.matches
    .filter(m => m.score >= 30 && m.match)
    .map(m => `• ${m.image} → ${m.match.obraz}: ${m.match.trakt}`)
    .join('\n');

  // Build the AI chat page as HTML string
  const html = `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ Анализ Сна</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a18; color: #e0d9f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .header { text-align: center; padding: 30px 20px 16px; }
  .header h1 { font-size: 1.5rem; color: #88aaff; }
  .header p { color: #6655aa; font-size: 0.85rem; margin-top: 6px; }
  .chat { flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 0 16px 120px; }
  .msg { margin-bottom: 16px; }
  .msg-ai { background: #111128; border: 1px solid #2a2a4a; border-radius: 12px 12px 12px 2px; padding: 16px; }
  .msg-user { background: #1a2a4a; border: 1px solid #2a4a7a; border-radius: 12px 12px 2px 12px; padding: 16px; text-align: right; }
  .msg p { line-height: 1.65; font-size: 0.95rem; white-space: pre-wrap; }
  .msg-ai p { color: #c8d8f0; }
  .msg-user p { color: #a0c0ff; }
  .msg-label { font-size: 0.75rem; color: #554477; margin-bottom: 6px; }
  .msg-ai .msg-label { color: #5577aa; }
  .input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d1a; border-top: 1px solid #1a1a35; padding: 12px 16px; }
  .input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
  textarea { flex: 1; background: #1a1a2e; border: 1px solid #3d3d60; color: #e0d9f0; padding: 10px 14px; border-radius: 10px; font-size: 0.95rem; resize: none; height: 48px; font-family: inherit; outline: none; }
  textarea:focus { border-color: #7c6fcd; }
  button { background: linear-gradient(135deg, #5c4faa, #7c6fcd); color: white; border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; font-size: 1.1rem; }
  button:disabled { opacity: 0.4; }
  .typing { color: #554488; font-size: 0.85rem; padding: 8px 0; }
  .final-block { background: #0a1520; border: 1px solid #2a4a6a; border-radius: 12px; padding: 20px; margin-top: 20px; }
  .final-block h3 { color: #88ccff; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 ИИ Анализ Сна</h1>
  <p>Углублённый разбор с уточняющими вопросами</p>
</div>
<div class="chat" id="chat"></div>
<div class="input-bar" id="inputBar" style="display:none">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Ваш ответ..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button onclick="sendMsg()" id="sendBtn">➤</button>
  </div>
</div>
<script>
const API_KEY = ${JSON.stringify(d.apiKey)};
const DREAM = ${JSON.stringify(d.dreamText)};
const SONNIK_MATCHES = ${JSON.stringify(matchedCards)};

const SYSTEM = \`Ты мудрый толкователь снов. У тебя есть:
1. Текст сна
2. Образы найденные в соннике с их трактовками

Твоя задача:
- Сначала дай интерпретацию каждого найденного образа в контексте сна (2-3 предложения на каждый)
- Затем задай не более 3 уточняющих вопросов — по одному, дожидаясь ответа
- После получения ответов на все вопросы — дай финальный общий анализ сна

Стиль: тёплый, образный, не мистический. Говори на "ты". Не пиши длинные списки, пиши живым текстом.

Текст сна: \${DREAM}

Образы из сонника:
\${SONNIK_MATCHES}\`;

let history = [];
let questionCount = 0;
let finalDone = false;

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg msg-' + (role === 'assistant' ? 'ai' : 'user');
  div.innerHTML = '<div class="msg-label">' + (role === 'assistant' ? '🤖 ИИ' : '👤 Ты') + '</div><p>' + text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.textContent = '✦ думаю...';
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function callClaude(userMsg) {
  if (userMsg) history.push({ role: 'user', content: userMsg });

  addTyping();
  document.getElementById('sendBtn').disabled = true;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history.length ? history : [{ role: 'user', content: 'Начни анализ.' }]
    })
  });

  removeTyping();
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);

  const text = data.content.map(c => c.text || '').join('');
  history.push({ role: 'assistant', content: text });
  addMsg('assistant', text);

  // Count questions
  const qCount = (text.match(/\?/g) || []).length;
  if (qCount > 0 && !finalDone) questionCount++;

  // After 3 questions answered, hide input
  if (questionCount >= 3 && history.filter(h => h.role === 'user').length >= 3) {
    document.getElementById('inputBar').style.display = 'none';
    finalDone = true;
  } else {
    document.getElementById('inputBar').style.display = 'block';
  }
  document.getElementById('sendBtn').disabled = false;
}

async function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  await callClaude(text);
}

// Start automatically
callClaude(null);
<\/script>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}
