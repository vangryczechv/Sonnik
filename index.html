<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разбор Сна</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #e0d9f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { text-align: center; padding: 40px 20px 20px; }
  .header h1 { font-size: 2rem; color: #c9b8ff; letter-spacing: 2px; }
  .header p { color: #8877aa; margin-top: 8px; font-size: 0.9rem; }

  .container { max-width: 800px; margin: 0 auto; padding: 20px; }

  .api-section { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .api-section label { display: block; color: #9988cc; font-size: 0.85rem; margin-bottom: 8px; }
  .api-section input { width: 100%; background: #0d0d1a; border: 1px solid #3d3d60; color: #e0d9f0; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; outline: none; }
  .api-section input:focus { border-color: #7c6fcd; }

  .input-section { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .input-section label { display: block; color: #9988cc; font-size: 0.85rem; margin-bottom: 8px; }
  textarea { width: 100%; background: #0d0d1a; border: 1px solid #3d3d60; color: #e0d9f0; padding: 12px; border-radius: 8px; font-size: 0.95rem; min-height: 120px; resize: vertical; outline: none; font-family: inherit; }
  textarea:focus { border-color: #7c6fcd; }

  .audio-zone { border: 2px dashed #3d3d60; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
  .audio-zone:hover { border-color: #7c6fcd; background: #1d1d35; }
  .audio-zone.dragover { border-color: #c9b8ff; background: #1d1d35; }
  .audio-zone p { color: #6655aa; font-size: 0.9rem; }
  .audio-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  #audioInput { display: none; }
  .audio-preview { margin-top: 12px; color: #9988cc; font-size: 0.85rem; }
  audio { margin-top: 8px; width: 100%; }

  .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #5c4faa, #7c6fcd); color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s; margin-bottom: 20px; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { text-align: center; color: #9988cc; font-size: 0.9rem; min-height: 20px; margin-bottom: 16px; }

  .results { display: none; }
  .results h2 { color: #c9b8ff; margin-bottom: 16px; font-size: 1.1rem; }

  .dream-card { background: #1a1a2e; border: 1px solid #2d2d50; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
  .dream-obraz { font-size: 1rem; font-weight: 600; color: #e0d9f0; margin-bottom: 6px; }
  .dream-match { font-size: 0.8rem; color: #7c6fcd; margin-bottom: 8px; }
  .dream-trakt { color: #b0a0d0; font-size: 0.9rem; line-height: 1.5; }

  .ai-analysis { background: #0f1726; border: 1px solid #2d3a55; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .ai-analysis h2 { color: #88aaff; margin-bottom: 12px; font-size: 1.1rem; }
  .ai-analysis p { color: #b0c0e0; line-height: 1.6; font-size: 0.95rem; }

  .no-match { color: #665577; font-size: 0.85rem; font-style: italic; }

  .divider { border: none; border-top: 1px solid #2d2d50; margin: 20px 0; }

  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; background: #12122a; border: 1px solid #2d2d50; border-radius: 8px; text-align: center; cursor: pointer; color: #6655aa; font-size: 0.85rem; transition: all 0.2s; }
  .tab.active { background: #1d1d40; border-color: #7c6fcd; color: #c9b8ff; }
</style>
</head>
<body>

<div class="header">
  <h1>🌙 Разбор Сна</h1>
  <p>Вставьте текст сна или загрузите аудио — получите трактовку образов</p>
</div>

<div class="container">

  <div class="api-section">
    <label>🔑 Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <div class="api-section">
    <label>🔑 OpenAI API Key <span style="color:#665577;font-size:0.8rem">(для расшифровки аудио)</span></label>
    <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off">
  </div>

  <div class="input-section">
    <div class="tab-row">
      <div class="tab active" onclick="switchTab('text')">✍️ Текст сна</div>
      <div class="tab" onclick="switchTab('audio')">🎙️ Аудио</div>
    </div>

    <div id="textTab">
      <label>Опишите ваш сон</label>
      <textarea id="dreamText" placeholder="Сегодня мне приснилось..."></textarea>
    </div>

    <div id="audioTab" style="display:none">
      <label>Загрузите голосовое сообщение (.ogg, .opus, .mp3, .m4a, .wav)</label>
      <div class="audio-zone" id="audioZone" onclick="document.getElementById('audioInput').click()">
        <div class="icon">🎤</div>
        <p>Нажмите или перетащите файл сюда</p>
      </div>
      <input type="file" id="audioInput" accept=".ogg,.opus,.mp3,.m4a,.wav,.webm">
      <div class="audio-preview" id="audioPreview"></div>
    </div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyze()">🔮 Разобрать сон</button>
  <div class="status" id="status"></div>

  <div class="results" id="results">
    <div class="ai-analysis" id="aiAnalysis" style="display:none">
      <h2>🤖 Общий анализ</h2>
      <p id="aiText"></p>
    </div>
    <hr class="divider">
    <h2>📖 Образы из сонника</h2>
    <div id="cardsContainer"></div>
  </div>

</div>

<script>
let sonnikData = null;
let audioFile = null;
let activeTab = 'text';

// Load sonnik.json dynamically
async function loadSonnik() {
  if (sonnikData) return sonnikData;
  try {
    const r = await fetch('./sonnik.json');
    sonnikData = await r.json();
    // Flatten to array for easy search
    sonnikData._flat = [];
    for (const letter in sonnikData) {
      if (letter === '_flat') continue;
      for (const entry of sonnikData[letter]) {
        sonnikData._flat.push(entry);
      }
    }
    return sonnikData;
  } catch(e) {
    throw new Error('Не удалось загрузить базу сонника (sonnik.json должен быть рядом с index.html)');
  }
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='text')||(i===1&&tab==='audio')));
  document.getElementById('textTab').style.display = tab === 'text' ? 'block' : 'none';
  document.getElementById('audioTab').style.display = tab === 'audio' ? 'block' : 'none';
}

// Audio drag & drop
const audioZone = document.getElementById('audioZone');
audioZone.addEventListener('dragover', e => { e.preventDefault(); audioZone.classList.add('dragover'); });
audioZone.addEventListener('dragleave', () => audioZone.classList.remove('dragover'));
audioZone.addEventListener('drop', e => {
  e.preventDefault();
  audioZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) setAudioFile(e.dataTransfer.files[0]);
});
document.getElementById('audioInput').addEventListener('change', e => {
  if (e.target.files[0]) setAudioFile(e.target.files[0]);
});

function setAudioFile(file) {
  audioFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('audioPreview').innerHTML = `<span>📎 ${file.name}</span><br><audio controls src="${url}"></audio>`;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function searchSonnik(images, data) {
  const flat = data._flat;
  const results = [];

  for (const img of images) {
    const imgLow = img.toLowerCase().trim();
    let best = null;
    let bestScore = 0;

    for (const entry of flat) {
      const obraz = entry.obraz.toLowerCase();
      let score = 0;
      if (obraz === imgLow) score = 100;
      else if (obraz.includes(imgLow) || imgLow.includes(obraz)) score = 70;
      else {
        const words = imgLow.split(' ');
        for (const w of words) {
          if (w.length > 3 && obraz.includes(w)) score += 20;
        }
      }
      if (score > bestScore) { bestScore = score; best = entry; }
    }

    results.push({ image: img, match: best, score: bestScore });
  }
  return results;
}

// Transcribe audio using OpenAI Whisper API
async function transcribeAudio(file) {
  const openaiKey = document.getElementById('openaiKey').value.trim();
  if (!openaiKey) throw new Error('Введите OpenAI API Key для расшифровки аудио');

  // Whisper принимает файл напрямую через FormData
  const formData = new FormData();
  // .opus файлы переименовываем в .ogg — Whisper их принимает
  const filename = file.name.endsWith('.opus') ? file.name.replace('.opus', '.ogg') : file.name;
  formData.append('file', file, filename);
  formData.append('model', 'whisper-1');
  formData.append('language', 'ru');

  const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + openaiKey },
    body: formData
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('Whisper: ' + (err.error?.message || resp.statusText));
  }

  const data = await resp.json();
  return data.text || '';
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('⚠️ Введите API ключ'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').style.display = 'none';

  try {
    // Step 1: Load sonnik
    setStatus('📚 Загружаю базу сонника...');
    const data = await loadSonnik();

    // Step 2: Get dream text
    let dreamText = '';
    if (activeTab === 'audio') {
      if (!audioFile) { setStatus('⚠️ Загрузите аудио файл'); btn.disabled = false; return; }
      setStatus('🎙️ Распознаю речь...');
      dreamText = await transcribeAudio(audioFile);
      if (!dreamText) throw new Error('Не удалось распознать речь. Попробуйте текстовый режим.');
      // Show transcribed text to user
      document.getElementById('dreamText').value = dreamText;
      setStatus('✅ Речь распознана. Анализирую...');
    } else {
      dreamText = document.getElementById('dreamText').value.trim();
      if (!dreamText) { setStatus('⚠️ Введите текст сна'); btn.disabled = false; return; }
    }

    // Step 3: Extract images via Claude
    setStatus('🔍 Извлекаю образы из сна...');
    const extractResp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Из текста сна выдели все ключевые образы (предметы, существа, места, явления, действия). 
Верни ТОЛЬКО список образов через запятую, без пояснений, без нумерации. 
Образы на русском языке, в именительном падеже, 1-4 слова каждый.

Текст сна: "${dreamText}"`
        }]
      })
    });
    const ed = await extractResp.json();
    if (ed.error) throw new Error(ed.error.message);
    const imagesRaw = ed.content.map(c => c.text || '').join('');
    const images = imagesRaw.split(',').map(s => s.trim()).filter(Boolean);

    // Step 4: Match with sonnik
    setStatus('📖 Сопоставляю с сонником...');
    const matches = searchSonnik(images, data);

    // Step 5: AI interpretation
    setStatus('✨ Создаю интерпретацию...');
    const matchedEntries = matches.filter(m => m.score >= 20).map(m => `${m.image}: ${m.match.trakt}`).join('\n');
    const interpretResp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Ты толкователь снов. Используя трактовки образов из сонника, дай общий связный анализ сна в 3-5 предложениях.

Сон: "${dreamText}"

Трактовки образов из сонника:
${matchedEntries}

Напиши общий анализ на русском языке, объединяя смыслы образов в единое послание.`
        }]
      })
    });
    const id = await interpretResp.json();
    if (id.error) throw new Error(id.error.message);
    const interpretation = id.content.map(c => c.text || '').join('');

    // Render results
    setStatus('');
    const aiEl = document.getElementById('aiAnalysis');
    document.getElementById('aiText').textContent = interpretation;
    aiEl.style.display = 'block';

    const cards = document.getElementById('cardsContainer');
    cards.innerHTML = '';
    for (const m of matches) {
      const card = document.createElement('div');
      card.className = 'dream-card';
      if (m.score >= 20 && m.match) {
        card.innerHTML = `
          <div class="dream-obraz">🌀 ${m.image}</div>
          <div class="dream-match">→ совпадение: «${m.match.obraz}»</div>
          <div class="dream-trakt">${m.match.trakt}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="dream-obraz">🌀 ${m.image}</div>
          <div class="no-match">Образ не найден в базе сонника</div>
        `;
      }
      cards.appendChild(card);
    }

    document.getElementById('results').style.display = 'block';

  } catch(e) {
    setStatus('❌ Ошибка: ' + e.message);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
