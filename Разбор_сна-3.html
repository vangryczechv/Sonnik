<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разбор сна</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg2: #141210;
    --bg3: #1c1916;
    --gold: #c9a96e;
    --gold2: #e8d5a3;
    --text: #d4cfc8;
    --text2: #8a8278;
    --border: #2a2520;
    --accent: #7a5c35;
    --error: #c0614a;
    --success: #6a9e6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    text-align: center;
    padding: 50px 20px 36px;
  }
  .header::after {
    content: '';
    display: block;
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }
  .header-ornament {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 60px);
    font-weight: 400;
    color: var(--gold2);
    letter-spacing: 6px;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text2);
    text-transform: uppercase;
  }

  /* Main layout */
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Input section */
  .input-section {
    margin-bottom: 32px;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text2);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .tab-panel { display: none; padding-top: 20px; }
  .tab-panel.active { display: block; }

  textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: 1px solid var(--gold);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    line-height: 1.8;
    padding: 20px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea::placeholder { color: var(--text2); font-style: italic; }
  textarea:focus { border-color: var(--gold); background: var(--bg3); }

  /* Audio upload */
  .audio-drop {
    border: 1px dashed var(--border);
    border-bottom: 1px dashed var(--gold);
    background: var(--bg2);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .audio-drop:hover, .audio-drop.dragover {
    border-color: var(--gold);
    background: var(--bg3);
  }
  .audio-drop input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 28px; margin-bottom: 10px; color: var(--gold); opacity: 0.7; }
  .drop-text { font-size: 13px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; }
  .drop-hint { font-size: 11px; color: var(--text2); margin-top: 6px; opacity: 0.6; }
  .file-chosen { margin-top: 12px; font-size: 13px; color: var(--gold); }

  /* API key */
  .api-key-wrap {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .api-key-wrap label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .api-key-wrap input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-wrap input:focus { border-color: var(--accent); color: var(--text); }

  /* Analyze button */
  .btn-analyze {
    display: block;
    width: 100%;
    margin-top: 20px;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold2);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-analyze:hover:not(:disabled) {
    background: var(--accent);
    color: var(--gold2);
  }
  .btn-analyze:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Status */
  .status {
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    min-height: 44px;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .status.error { color: var(--error); }
  .status.working { color: var(--gold); }
  .spinner {
    width: 14px; height: 14px;
    border: 1px solid var(--gold);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .section-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 14px;
  }

  /* Dream text */
  .dream-text-block {
    background: var(--bg2);
    border-left: 2px solid var(--gold);
    padding: 24px 28px;
    margin-bottom: 40px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-style: italic;
    line-height: 1.9;
    color: var(--text);
  }
  .dream-text-block .highlighted-word {
    color: var(--gold2);
    border-bottom: 1px dotted var(--gold);
    cursor: default;
    font-style: normal;
  }

  /* Interpretations */
  .interpretations-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .interp-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    padding: 18px 22px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }
  .interp-card:hover {
    border-left-color: var(--gold);
    background: var(--bg3);
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: none; }
    from { opacity: 0; transform: translateY(6px); }
  }
  .interp-image {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold2);
    font-style: italic;
    margin-bottom: 8px;
  }
  .interp-meanings {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }
  .interp-meanings .m-item {
    display: flex; gap: 8px; margin-bottom: 3px;
  }
  .interp-meanings .m-item:last-child { margin-bottom: 0; }
  .m-num { color: var(--gold); font-size: 10px; opacity: 0.7; margin-top: 4px; flex-shrink: 0; }

  .not-found-block {
    margin-top: 20px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
  }
  .not-found-block span { color: var(--text2); opacity: 0.7; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 40px 0;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-ornament">✦ &nbsp; инструмент разбора &nbsp; ✦</div>
  <h1>РАЗБОР СНА</h1>
  <div class="header-sub">Анализ образов · Трактовки</div>
</div>

<div class="container">

  <div class="input-section">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('text', this)">Текст</button>
      <button class="tab" onclick="switchTab('audio', this)">Аудио</button>
    </div>

    <div class="tab-panel active" id="tab-text">
      <textarea id="dreamText" placeholder="Введите или вставьте текст сна..." rows="7"></textarea>
    </div>

    <div class="tab-panel" id="tab-audio">
      <div class="audio-drop" id="audioDrop">
        <input type="file" id="audioFile" accept="audio/*,.ogg,.oga,.opus,.mp3,.m4a,.wav,.aac" onchange="onFileChosen(this)">
        <div class="drop-icon">🎙</div>
        <div class="drop-text">Нажмите или перетащите файл</div>
        <div class="drop-hint">Голосовые WhatsApp (.ogg, .opus), mp3, m4a, wav</div>
        <div class="file-chosen" id="fileChosen"></div>
      </div>
    </div>

    <div class="api-key-wrap">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey(this.value)">
    </div>

    <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">
      ✦ &nbsp; Разобрать сон &nbsp; ✦
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="results" id="results">
    <div class="section-label">Текст сна</div>
    <div class="dream-text-block" id="dreamOutput"></div>

    <div class="divider"></div>

    <div class="section-label">Образы и трактовки</div>
    <div class="interpretations-grid" id="interpsGrid"></div>

    <div id="notFoundBlock"></div>
  </div>

</div>

// Build lookup: lowercase image -> entry
const lookup = {};
const lookupParts = {};
SONNIK.forEach(e => {
  const key = e.image.toLowerCase().replace(/[«»"()]/g, '').trim();
  lookup[key] = e;
  // Also index first word for partial matching
  const firstWord = key.split(/[\s,]+/)[0];
  if (firstWord.length > 3) {
    if (!lookupParts[firstWord]) lookupParts[firstWord] = [];
    lookupParts[firstWord].push(e);
  }
});

// Restore saved key
const savedKey = localStorage.getItem('sonnik_api_key') || '';
document.getElementById('apiKey').value = savedKey;

function saveKey(val) {
  localStorage.setItem('sonnik_api_key', val);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function onFileChosen(input) {
  const f = input.files[0];
  document.getElementById('fileChosen').textContent = f ? f.name : '';
}

// Drag-drop
const drop = document.getElementById('audioDrop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) {
    document.getElementById('audioFile').files = e.dataTransfer.files;
    document.getElementById('fileChosen').textContent = f.name;
  }

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status' + (type ? ' ' + type : '');
  if (type === 'working') {
    el.innerHTML = '<div class="spinner"></div>' + msg;
  } else {
    el.textContent = msg;
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('Введите API ключ', 'error'); return; }

  const activeTab = document.querySelector('.tab.active').textContent.trim();
  const isAudio = activeTab === 'Аудио';

  let dreamText = '';

  const btn = document.getElementById('btnAnalyze');
  btn.disabled = true;
  document.getElementById('results').classList.remove('visible');

  try {
    if (isAudio) {
      const file = document.getElementById('audioFile').files[0];
      if (!file) { setStatus('Выберите аудио файл', 'error'); btn.disabled = false; return; }

      setStatus('Расшифровываю аудио...', 'working');
      const base64 = await toBase64(file);
      const mimeType = file.type || 'audio/ogg';

      // Transcribe via Claude
      const transcResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-ipc': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: [
              { type: 'document', source: { type: 'base64', media_type: mimeType, data: base64 } },
              { type: 'text', text: 'Это голосовое сообщение с рассказом о сне. Расшифруй его дословно, исправляя только явные оговорки. Верни только текст расшифровки, без комментариев.' }
            ]
          }]
        })
      });
      const transcData = await transcResp.json();
      if (transcData.error) throw new Error(transcData.error.message);
      dreamText = transcData.content[0].text.trim();

    } else {
      dreamText = document.getElementById('dreamText').value.trim();
      if (!dreamText) { setStatus('Введите текст сна', 'error'); btn.disabled = false; return; }
    }

    setStatus('Извлекаю образы...', 'working');

    // Extract images via Claude
    const extractResp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-ipc': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Это текст сна. Вытащи из него все значимые образы, предметы, существа, действия, места, людей и ситуации.

Текст сна:
${dreamText}

Верни ТОЛЬКО JSON массив строк — список образов на русском языке. Никакого другого текста. Пример:
["собака","дом","лестница","падение","незнакомый мужчина"]`
        }]
      })
    });

    const extractData = await extractResp.json();
    if (extractData.error) throw new Error(extractData.error.message);

    let rawImages = [];
    try {
      const txt = extractData.content[0].text.trim().replace(/^```json|^```|```$/gm, '').trim();
      rawImages = JSON.parse(txt);
    } catch(e) {
      rawImages = [];
    }

    // Match images against sonnik
    const matched = [];
    const unmatched = [];

    rawImages.forEach(img => {
      const found = findInSonnik(img);
      if (found) {
        matched.push({ query: img, entry: found });
      } else {
        unmatched.push(img);
      }
    });

    // Render results
    renderResults(dreamText, matched, unmatched, rawImages);
    setStatus('');

  } catch(err) {
    setStatus('Ошибка: ' + err.message, 'error');
  }

  btn.disabled = false;
}

function findInSonnik(query) {
  const q = query.toLowerCase().replace(/[«»"()]/g, '').trim();

  // Exact match
  if (lookup[q]) return lookup[q];

  // Try without trailing punctuation / articles
  const qClean = q.replace(/[.,!?;:]+$/, '').trim();
  if (lookup[qClean]) return lookup[qClean];

  // Partial: sonnik key contains query word
  for (const key of Object.keys(lookup)) {
    if (key.includes(qClean) && qClean.length > 3) return lookup[key];
  }

  // Query contains sonnik key
  for (const key of Object.keys(lookup)) {
    if (key.length > 3 && qClean.includes(key)) return lookup[key];
  }

  // First word match
  const firstWord = qClean.split(/[\s,]+/)[0];
  if (firstWord.length > 3 && lookupParts[firstWord]) {
    return lookupParts[firstWord][0];
  }

  return null;
}

function highlightImages(text, matchedImages) {
  let result = text;
  // Sort by length desc to avoid partial overlaps
  const words = matchedImages.map(m => m.query).sort((a,b) => b.length - a.length);
  words.forEach(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escaped + ')', 'gi');
    result = result.replace(re, '<span class="highlighted-word">$1</span>');
  });
  return result;
}

function renderResults(dreamText, matched, unmatched, allImages) {
  // Dream text with highlights
  const dreamOut = document.getElementById('dreamOutput');
  dreamOut.innerHTML = highlightImages(dreamText, matched);

  // Interpretations
  const grid = document.getElementById('interpsGrid');
  grid.innerHTML = '';

  // Deduplicate by entry image
  const seen = new Set();
  matched.forEach((m, i) => {
    const key = m.entry.image;
    if (seen.has(key)) return;
    seen.add(key);

    const card = document.createElement('div');
    card.className = 'interp-card';
    card.style.animationDelay = (i * 40) + 'ms';

    let meanHtml = '';
    if (m.entry.meanings.length === 1) {
      meanHtml = m.entry.meanings[0];
    } else {
      meanHtml = m.entry.meanings.map((mn, idx) =>
        `<div class="m-item"><span class="m-num">${idx+1}.</span><span>${mn}</span></div>`
      ).join('');
    }

    card.innerHTML = `
      <div class="interp-image">${m.entry.image}</div>
      <div class="interp-meanings">${meanHtml}</div>
    `;
    grid.appendChild(card);
  });

  // Not found
  const notFound = document.getElementById('notFoundBlock');
  if (unmatched.length > 0) {
    notFound.innerHTML = `<div class="not-found-block">
      <span>Образы без трактовки в базе: </span>${unmatched.join(', ')}
    </div>`;
  } else {
    notFound.innerHTML = '';
  }

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
